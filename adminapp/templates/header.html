{% load static %}
{% if request.session.id == None %}
<script>window.location.href="login";</script>
{% endif %}

<div class="navbar-inner" style="height: 95px;">
            <button type="button" class="navbar-toggle pull-left animated flip">
                <span class="sr-only">Toggle navigation</span>
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
            </button>
            <a class="navbar-brand" href="/adminapp/"> <img alt="Supertech Mobila" title="Supertech Mobila" src="{% static 'img/p_logo.jpg' %}" class="hidden-xs" style="width: 100px;height:85px;margin-left: 25%;margin-top: -13px;border-radius: 80%;"/></a>

            <!-- user dropdown starts -->
            <div class="btn-group pull-right">
                <button class="btn btn-default dropdown-toggle" data-toggle="dropdown">
                    <i class="glyphicon glyphicon-user"></i><span class="hidden-sm hidden-xs"> {{request.session.username}}</span>
                    <span class="caret"></span>
                </button>
                <ul class="dropdown-menu">
                    <li><img src="{% static 'img/' %}{{request.session.image}}" style="width: 100px;height: 100px;" alt=""></li>
                    <li class="divider"></li>
                    <li><a href="/adminapp/logout">Logout</a></li>
                </ul>
            </div>
            <!-- user dropdown ends -->

         

            <ul class="collapse navbar-collapse nav navbar-nav top-menu">
                <li><a href="#"><i class="glyphicon glyphicon-globe"></i> Visit Site : {{request.session.time}}</a></li>
               
               
            </ul>

        </div>
